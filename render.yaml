services:
  - type: web
    name: ai-news-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: DB_PATH
        value: /data/users.db
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    autoDeploy: true
